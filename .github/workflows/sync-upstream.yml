name: Sync upstream (rebase)

on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 9am UTC
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for upstream changes
        id: check
        run: |
          git remote add upstream https://github.com/steipete/clawdis.git
          git fetch upstream
          
          UPSTREAM_COMMITS=$(git rev-list HEAD..upstream/main --count)
          echo "new_commits=$UPSTREAM_COMMITS" >> $GITHUB_OUTPUT
          
          if [ "$UPSTREAM_COMMITS" -eq 0 ]; then
            echo "No new upstream commits"
          else
            echo "Found $UPSTREAM_COMMITS new upstream commits"
          fi

      - name: Rebase onto upstream
        if: steps.check.outputs.new_commits != '0'
        run: |
          # Save our local commits
          git checkout -b backup-$(date +%Y%m%d) HEAD
          git checkout master
          
          # Rebase our commits onto upstream
          git rebase upstream/main
          
          # Force push (safe since we're the only writers)
          git push --force-with-lease origin master

      - name: Create issue on conflict
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Upstream sync failed - rebase conflict',
              body: 'The daily upstream sync failed due to a rebase conflict. Manual intervention required.\n\nRun locally:\n```bash\ngit fetch origin && git fetch upstream\ngit rebase upstream/main\n# resolve conflicts\ngit push --force-with-lease origin master\n```',
              labels: ['upstream-sync', 'needs-attention']
            })
